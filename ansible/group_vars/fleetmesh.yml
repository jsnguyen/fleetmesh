fleetmesh_repo_url: "CHANGE_ME_TO_YOUR_FLEETMESH_GIT_REPO_URL"
fleetmesh_repo_version: main
fleetmesh_repo_dir: fleetmesh
fleetmesh_config_dir: /etc/fleetmesh
fleetmesh_ship_id: "{{ inventory_hostname | lower }}"
fleetmesh_ship_name: "{{ inventory_hostname }}"
fleetmesh_bot_username: "{{ fleetmesh_ship_id }}_ship_bot"
fleetmesh_service_user: "{{ ansible_user_id }}"
fleetmesh_service_home: "{{ ansible_user_dir }}"
fleetmesh_app_dir: "{{ fleetmesh_service_home }}/{{ fleetmesh_repo_dir }}"
fleetmesh_node_bin: /usr/bin/env node

# Put this value in an Ansible Vault file, for example:
# ansible-vault create group_vars/all/vault.yml
fleetmesh_telegram_user_id: "{{ vault_telegram_user_id }}"
fleetmesh_telegram_bot_token: "{{ lookup('vars', 'vault_' ~ (inventory_hostname | lower) ~ '_bot_token') }}"
