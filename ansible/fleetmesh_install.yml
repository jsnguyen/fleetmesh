---
- name: Install FleetMesh
  hosts: homelab
  gather_facts: true

  vars:
    fleetmesh_repo_url: ""
    fleetmesh_repo_version: main
    fleetmesh_dir: "{{ ansible_user_dir }}/fleetmesh"
    fleetmesh_config_dir: /etc/fleetmesh
    fleetmesh_user: "{{ ansible_user_id }}"
    fleetmesh_ship_id: "{{ inventory_hostname | lower }}"
    fleetmesh_ship_name: "{{ inventory_hostname | title }}"
    fleetmesh_bot_username: "{{ fleetmesh_ship_id }}_ship_bot"
    fleetmesh_node_bin: /usr/bin/env node
    fleetmesh_telegram_user_id: ""
    fleetmesh_bot_tokens: {}
    fleetmesh_telegram_bot_token: "{{ fleetmesh_bot_tokens[fleetmesh_ship_id] | default('') }}"

  tasks:
    - name: Validate FleetMesh variables
      ansible.builtin.assert:
        that:
          - fleetmesh_repo_url | length > 0
          - fleetmesh_telegram_user_id | string | length > 0
          - fleetmesh_telegram_bot_token | length > 0
        fail_msg: "Pass FleetMesh variables with Ansible Vault, for example: -e @fleetmesh.vault.yml --ask-vault-pass"

    - name: Check Node.js is available
      ansible.builtin.command: node --version
      register: fleetmesh_node_version
      changed_when: false

    - name: Validate Node.js version
      ansible.builtin.assert:
        that:
          - (fleetmesh_node_version.stdout | regex_replace('^v([0-9]+).*', '\\1') | int) >= 20
        fail_msg: "FleetMesh requires Node.js 20 or newer."

    - name: Install git
      ansible.builtin.package:
        name: git
        state: present
      become: true

    - name: Create FleetMesh directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ fleetmesh_user }}"
        mode: "0750"
      loop:
        - "{{ fleetmesh_config_dir }}"
        - "{{ fleetmesh_config_dir }}/scripts"
      become: true

    - name: Clone FleetMesh repository
      ansible.builtin.git:
        repo: "{{ fleetmesh_repo_url }}"
        dest: "{{ fleetmesh_dir }}"
        version: "{{ fleetmesh_repo_version }}"
        update: true
        force: false
      notify: Restart FleetMesh

    - name: Install ship config
      ansible.builtin.copy:
        dest: "{{ fleetmesh_config_dir }}/ship.config.json"
        owner: "{{ fleetmesh_user }}"
        mode: "0640"
        force: false
        content: |
          {
            "ship": {
              "id": "{{ fleetmesh_ship_id }}",
              "name": "{{ fleetmesh_ship_name }}"
            },
            "telegram": {
              "botUsername": "{{ fleetmesh_bot_username }}"
            },
            "commands": {
              "status": {
                "script": "{{ fleetmesh_config_dir }}/scripts/status.sh",
                "timeoutSeconds": 5
              }
            }
          }
      become: true

    - name: Install Telegram credentials
      ansible.builtin.copy:
        dest: "{{ fleetmesh_config_dir }}/.tgcreds.json"
        owner: "{{ fleetmesh_user }}"
        mode: "0600"
        content: |
          {
            "bot_token": "{{ fleetmesh_telegram_bot_token }}",
            "user_id": {{ fleetmesh_telegram_user_id }}
          }
      no_log: true
      notify: Restart FleetMesh
      become: true

    - name: Install default status command
      ansible.builtin.copy:
        dest: "{{ fleetmesh_config_dir }}/scripts/status.sh"
        owner: "{{ fleetmesh_user }}"
        mode: "0750"
        force: false
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "Ship: {{ fleetmesh_ship_name }}"
          echo "Host: $(hostname)"
          echo "Uptime: $(uptime)"
      become: true

    - name: Install systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/fleetmesh.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FleetMesh ship agent ({{ fleetmesh_ship_name }})
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ fleetmesh_user }}
          WorkingDirectory={{ fleetmesh_dir }}
          ExecStart={{ fleetmesh_node_bin }} {{ fleetmesh_dir }}/bin/fleetmesh.js --config {{ fleetmesh_config_dir }}/ship.config.json --creds {{ fleetmesh_config_dir }}/.tgcreds.json
          Restart=always
          RestartSec=5
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
      notify:
        - Reload systemd
        - Restart FleetMesh
      become: true

    - name: Enable and start FleetMesh
      ansible.builtin.systemd:
        name: fleetmesh.service
        enabled: true
        state: started
        daemon_reload: true
      become: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      become: true

    - name: Restart FleetMesh
      ansible.builtin.systemd:
        name: fleetmesh.service
        state: restarted
      become: true

